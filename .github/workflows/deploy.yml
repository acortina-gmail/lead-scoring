name: Deploy

# Integration flow on push:
#   push develop -> quality -> build -> train(dev, --wait) -> deploy serving (dev)
#   push main    -> quality -> build -> [APPROVE prod] -> train(prod, --wait) -> deploy (prod)
#
# `train` runs the Vertex pipeline with --wait, so the job stays "running" until Vertex
# finishes and goes GREEN only if it SUCCEEDED (red if it failed). The deploy then serves
# the just-trained model deterministically. ENV + the prod approval are derived from the
# branch. Retraining on a data cadence (monthly) lives in train.yml.
#
# Auth: service-account key JSON in the GCP_SA_KEY secret (see deploy/CICD.md).
on:
  push:
    branches: [develop, main]
    paths:
      - "ml/lead_scoring/pre_lead/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ml/lead_scoring/pre_lead

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ml/lead_scoring/pre_lead/pyproject.toml
            ml/lead_scoring/pre_lead/requirements-dev.txt
      - run: pip install -e . -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -q

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build + push images (Cloud Build)
        run: ./deploy/01_build_images.sh

  train:
    needs: build
    runs-on: ubuntu-latest
    # GitHub's max; --wait blocks until Vertex finishes, so this must be generous.
    timeout-minutes: 360
    # main -> prod Environment (required reviewer): PAUSES for approval BEFORE training
    # prod. develop -> dev (no protection): runs straight through.
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      PYTHON: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Train on Vertex and wait for it to finish
        run: ./deploy/02_run_pipeline.sh --wait

  deploy:
    needs: train
    runs-on: ubuntu-latest
    # No `environment` here on purpose: the single prod approval already happened on the
    # `train` job, so the deploy doesn't ask again. Serves the model just trained above.
    env:
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy serving to Cloud Run
        run: ./deploy/03_deploy_serving.sh
