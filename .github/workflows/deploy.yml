name: Deploy

# On merge to main: re-run the quality gate, build both images (Cloud Build),
# deploy the serving API to Cloud Run dev, then deploy to prod — which pauses for
# a required-reviewer approval on the `prod` GitHub Environment (the dev->prod gate
# from CLAUDE.md). Retraining is NOT here — it's train.yml.
#
# Auth: service-account key JSON in the GCP_SA_KEY secret (see deploy/CICD.md).
# GCP project/region/bucket come from deploy/config.sh defaults; override via
# repo Variables (PROJECT_ID, REGION, BUCKET) if they ever change.
on:
  push:
    branches: [main]
    paths:
      - "ml/lead_scoring/pre_lead/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ml/lead_scoring/pre_lead

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ml/lead_scoring/pre_lead/pyproject.toml
            ml/lead_scoring/pre_lead/requirements-dev.txt
      - run: pip install -e . -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -q

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build + push images (Cloud Build)
        run: ./deploy/01_build_images.sh

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    env:
      ENV: dev
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy serving to Cloud Run (dev)
        run: ./deploy/03_deploy_serving.sh

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    # Pauses for a required reviewer on the `prod` Environment — the dev->prod gate.
    environment: prod
    env:
      ENV: prod
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy serving to Cloud Run (prod)
        # Reuses the same image (env injected via Cloud Run env vars). Serves
        # models/prod/live — train+promote prod first via train.yml.
        run: ./deploy/03_deploy_serving.sh
